---
# ReviewMark Configuration File
needs-review:
  - "README.md"                          # Root README
  - "requirements.yaml"                  # Root requirements file
  - "docs/reqstream/**/*.yaml"           # Requirements files
  - "docs/design/**/*.md"               # Design documents
  - "docs/user_guide/**/*.md"                # User guide
  - "**/*.cs"                            # All C# source and test files
  - "!**/obj/**"                         # Exclude build output
  - "!**/bin/**"                         # Exclude build output

evidence-source:
  type: url
  location: https://raw.githubusercontent.com/demaconsulting/NuGetCaching/reviews/index.json

reviews:
  - id: Purpose
    title: Review that Advertised Features Match System Design
    paths:
      - "README.md"
      - "docs/user_guide/**/*.md"
      - "docs/reqstream/nuget-caching/nuget-caching.yaml"
      - "docs/design/introduction.md"
      - "docs/design/nuget-caching/nuget-caching.md"

  - id: NuGetCaching-Architecture
    title: Review that NuGetCaching Architecture Satisfies Requirements
    paths:
      - "docs/reqstream/nuget-caching/nuget-caching.yaml"
      - "docs/design/introduction.md"
      - "docs/design/nuget-caching/nuget-caching.md"
      - "test/DemaConsulting.NuGet.Caching.Tests/NuGetCachingTests.cs"

  - id: NuGetCaching-Design
    title: Review that NuGetCaching Design is Consistent and Complete
    paths:
      - "docs/reqstream/nuget-caching/nuget-caching.yaml"
      - "docs/reqstream/nuget-caching/platform-requirements.yaml"
      - "docs/design/introduction.md"
      - "docs/design/nuget-caching/**/*.md"

  - id: NuGetCaching-AllRequirements
    title: Review that All NuGetCaching Requirements are Complete
    paths:
      - "requirements.yaml"
      - "docs/reqstream/nuget-caching/**/*.yaml"
      - "docs/reqstream/ots/**/*.yaml"

  - id: NuGetCaching-NuGetCache
    title: Review that NuGetCaching NuGetCache Implementation is Correct
    paths:
      - "docs/reqstream/nuget-caching/nuget-cache.yaml"
      - "docs/design/nuget-caching/nuget-cache.md"
      - "src/DemaConsulting.NuGet.Caching/NuGetCache.cs"
      - "test/DemaConsulting.NuGet.Caching.Tests/NuGetCacheTests.cs"

  - id: NuGetCaching-PathHelpers
    title: Review that NuGetCaching PathHelpers Implementation is Correct
    paths:
      - "docs/reqstream/nuget-caching/path-helpers.yaml"
      - "docs/design/nuget-caching/path-helpers.md"
      - "src/DemaConsulting.NuGet.Caching/PathHelpers.cs"
      - "test/DemaConsulting.NuGet.Caching.Tests/PathHelpersTests.cs"
