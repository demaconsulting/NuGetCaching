---
# Root Requirements File
#
# PURPOSE:
# - Serve as the entry point for ReqStream requirement processing
# - Include all reviewable requirement files from the docs/reqstream/ directory
#
# USAGE:
# - Run ReqStream against this file to process all requirements:
#
#   dotnet reqstream \
#     --requirements requirements.yaml \
#     --tests "artifacts/**/*.trx" \
#     --report docs/requirements_doc/requirements.md \
#     --justifications docs/requirements_doc/justifications.md \
#     --matrix docs/requirements_report/trace_matrix.md \
#     --enforce
#
# - Add new requirement files under docs/reqstream/ and add them to the includes
#   list below (system files first, then platform, then subsystem/unit files, then ots files)

includes:
  - docs/reqstream/nuget-caching/nuget-caching.yaml
  - docs/reqstream/nuget-caching/platform-requirements.yaml
  - docs/reqstream/nuget-caching/nuget-cache.yaml
  - docs/reqstream/nuget-caching/path-helpers.yaml
  - docs/reqstream/ots/nuget.yaml
  - docs/reqstream/ots/mstest.yaml
  - docs/reqstream/ots/reqstream.yaml
  - docs/reqstream/ots/buildmark.yaml
  - docs/reqstream/ots/versionmark.yaml
  - docs/reqstream/ots/sarifmark.yaml
  - docs/reqstream/ots/sonarmark.yaml
  - docs/reqstream/ots/reviewmark.yaml
  - docs/reqstream/ots/pandoc.yaml
  - docs/reqstream/ots/weasyprint.yaml
  - docs/reqstream/ots/fileassert.yaml
